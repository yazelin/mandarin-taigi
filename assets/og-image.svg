    <polygon points="264,268 264,288 280,278" fill="#1f5b4f"/>
    <text x="291" y="286" fill="#17463d" font-size="20" font-weight="800">聽台語</text>
  </g>

  <path d="M1089 529c15-17 15-45 0-62M1110 548c27-28 27-75 0-103" fill="none" stroke="#f2b94b" stroke-width="11" stroke-linecap="round"/>
  <circle cx="1064" cy="498" r="15" fill="#f2b94b"/>
