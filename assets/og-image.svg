      <rect x="126" y="0" width="154" height="43" rx="21.5" fill="#dceee5"/>
      <text x="203" y="29" text-anchor="middle">免 API key</text>
      <rect x="294" y="0" width="132" height="43" rx="21.5" fill="#dceee5"/>
      <text x="360" y="29" text-anchor="middle">可離線</text>
    </g>

    <text x="74" y="536" fill="#52665f" font-size="21">982 華語詞目・12,271 腔口對照</text>
    <text x="74" y="572" fill="#52665f" font-size="21">1,093 台語音・98 華語官方單字朗讀</text>
  </g>

  <g transform="translate(735 142)" font-family="Noto Sans CJK TC, sans-serif">
    <rect width="395" height="355" rx="28" fill="#ffffff" stroke="#cfddd6" stroke-width="3"/>
    <rect x="28" y="29" width="339" height="66" rx="14" fill="#fbfaf4" stroke="#9fb8ae" stroke-width="3"/>
    <text x="51" y="73" fill="#17312b" font-size="26" font-weight="700">醫院</text>
    <rect x="285" y="40" width="68" height="44" rx="11" fill="#1f5b4f"/>
    <text x="319" y="70" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">查詞</text>

    <text x="31" y="137" fill="#1f5b4f" font-size="17" font-weight="800" letter-spacing="2">華語詞目</text>
    <text x="31" y="187" fill="#17312b" font-size="39" font-weight="900">醫院</text>
    <line x1="31" y1="213" x2="364" y2="213" stroke="#cfddd6" stroke-width="2"/>
    <text x="31" y="266" fill="#17312b" font-size="35" font-weight="900">病院</text>
    <text x="31" y="307" fill="#52665f" font-size="23">pīnn-īnn</text>
