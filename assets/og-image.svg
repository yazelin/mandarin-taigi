<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">國台語詞語對照</title>
  <desc id="desc">這句國語，台語按怎講？免登入、免 API key、可離線使用。</desc>
  <rect width="1200" height="630" fill="#fbfaf4"/>
  <circle cx="1080" cy="-10" r="260" fill="#fff1ca"/>
  <circle cx="112" cy="650" r="190" fill="#dceee5"/>

  <g transform="translate(70 58)">
    <rect width="174" height="62" rx="17" fill="#1f5b4f"/>
    <text x="87" y="41" fill="#ffffff" font-family="Noto Sans CJK TC, sans-serif" font-size="29" font-weight="800" text-anchor="middle">國 ↔ 台</text>
    <text x="194" y="41" fill="#17312b" font-family="Noto Sans CJK TC, sans-serif" font-size="29" font-weight="800">詞語對照</text>
  </g>

  <g font-family="Noto Sans CJK TC, sans-serif">
    <text x="70" y="230" fill="#17312b" font-size="68" font-weight="900">這句國語，</text>
